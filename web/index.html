<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="WorkWorkWorki" />
    <meta name="theme-color" content="#0d0d0d" />
    <meta name="color-scheme" content="dark" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>WorkWorkWorki</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
      :root { color-scheme: dark; }
      html {
        width: 100%;
        height: 100%;
        height: -webkit-fill-available;
        background-color: #0d0d0d;
      }
      body {
        width: 100%;
        height: 100%;
        min-height: -webkit-fill-available;
        background-color: #0d0d0d;
        overflow: hidden;
      }
      #root {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        background-color: #0d0d0d;
        overflow: hidden;
      }
      video { -webkit-playsinline: true; }
    </style>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        function fixVideos() {
          document.querySelectorAll('video').forEach(function (v) {
            v.setAttribute('playsinline', '');
            v.setAttribute('webkit-playsinline', '');
            v.playsInline = true;
          });
        }
        fixVideos();
        new MutationObserver(fixVideos).observe(document.body, { childList: true, subtree: true });
        document.addEventListener('play', fixVideos, true);
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/service-worker.js');
        }
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
